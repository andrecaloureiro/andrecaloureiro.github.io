<!DOCTYPE html>
<html>
<head>
    <title>Firebase Data List</title>
    <script src="https://www.gstatic.com/firebasejs/11.3.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.3.1/firebase-database.js"></script>
</head>
<body>
    <h1>Firebase Data List</h1>
    <ul id="dataList"></ul>
    
    <input type="text" id="dataValue" placeholder="Enter value">
    <button onClick="pushData()">Add data to Firebase</button>
    
    <script>
        // Your Firebase configuration
        const firebaseConfig = {
          apiKey: "AIzaSyA7mkU5fxGQX0GZjZmVmqMBMqW41JOfNto",
          authDomain: "sqlbank-9b915.firebaseapp.com",
          databaseURL: "https://sqlbank-9b915-default-rtdb.firebaseio.com",
          projectId: "sqlbank-9b915",
          storageBucket: "sqlbank-9b915.firebasestorage.app",
          messagingSenderId: "706638031015",
          appId: "1:706638031015:web:3f4c815aebd93072b61382",
          measurementId: "G-BXVGGWNBSM"
        };

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function pushData(){
            var data = document.getElementById("dataValue").value;
            var dataRef = database.ref('pushData').push(); // Generates a new child location
            dataRef.set({
                value: data
            });
        }

        function fetchData() {
            database.ref('pushData').on('value', (snapshot) => {
                const dataList = document.getElementById("dataList");
                dataList.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const li = document.createElement("li");
                    li.textContent = childSnapshot.val().value;
                    dataList.appendChild(li);
                });
            });
        }

        // Fetch data on page load
        fetchData();
    </script>
</body>
</html>
